# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v2.json
# Schema version number
version: 2

# The type of configuration schema
kind: CapabilityMap

# Name for the device event map
name: AYN MCU Mapping

# Unique identifier of the capability mapping
id: ayn_mcu

# List of mapped events
mapping:
  - name: Guide Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_MODE
          value_type: button
    target_event:
      gamepad:
        button: Guide

  - name: South Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_SOUTH
          value_type: button
    target_event:
      gamepad:
        button: South

  - name: West Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_NORTH
          value_type: button
    target_event:
      gamepad:
        button: West

  - name: North Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_WEST
          value_type: button
    target_event:
      gamepad:
        button: North

  - name: East Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_EAST
          value_type: button
    target_event:
      gamepad:
        button: East

  - name: Start Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_START
          value_type: button
    target_event:
      gamepad:
        button: Start

  - name: Select Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_SELECT
          value_type: button
    target_event:
      gamepad:
        button: Select

  - name: Screenshot Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_BACK
          value_type: button
    target_event:
      gamepad:
        button: Screenshot

  - name: Right Trigger
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_RZ
          value_type: trigger
    target_event:
      gamepad:
        trigger:
          name: RightTrigger

  - name: Left Trigger
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_Z
          value_type: trigger
    target_event:
      gamepad:
        trigger:
          name: LeftTrigger

  - name: Right Bumper
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TR
          value_type: button
    target_event:
      gamepad:
        button: RightBumper

  - name: Left Bumper
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TL
          value_type: button
    target_event:
      gamepad:
        button: LeftBumper

  - name: Right Paddle
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_C
          value_type: button
    target_event:
      gamepad:
        button: RightPaddle1

  - name: Left Paddle
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_Z
          value_type: button
    target_event:
      gamepad:
        button: LeftPaddle1

  - name: Right Stick
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_RX
          value_type: joystick_x
      - evdev:
          event_type: ABS
          event_code: ABS_RY
          value_type: joystick_y
    target_event:
      gamepad:
        axis:
          name: RightStick

  - name: Left Stick
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_X
          value_type: joystick_x
      - evdev:
          event_type: ABS
          event_code: ABS_Y
          value_type: joystick_y
    target_event:
      gamepad:
        axis:
          name: LeftStick

  - name: Right Stick Click
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_THUMBR
          value_type: button
    target_event:
      gamepad:
        button: RightStick

  - name: Left Stick Click
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_THUMBL
          value_type: button
    target_event:
      gamepad:
        button: LeftStick

  - name: Dpad Left
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_LEFT
          value_type: button
    target_event:
      gamepad:
        button: DPadLeft

  - name: Dpad Right
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_RIGHT
          value_type: button
    target_event:
      gamepad:
        button: DPadRight

  - name: Dpad Down
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_DOWN
          value_type: button
    target_event:
      gamepad:
        button: DPadDown

  - name: Dpad Up
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_UP
          value_type: button
    target_event:
      gamepad:
        button: DPadUp

# List of events to filter from the source devices
filtered_events: []
